name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            g++ \
            libz3-dev \
            llvm \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-venv \
            python3-wheel

      - name: Run test suite
        run: make test

  upstream-z3:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            curl \
            g++ \
            llvm \
            python3 \
            unzip

      - name: Run K2 smoke against pinned upstream Z3 release
        run: make test-k2-z3-release
